<!-- JSON-LD Structured Data -->
<script type="application/ld+json">{
  "@context": "https://schema.org",
  "@type": "ContactPage",
  "name": "Contact Box To Go",
  "url": "https://box-to-go-staging.askkoraai.com/contact",
  "description": "Request a wholesale quote for restaurant takeout packaging.",
  "mainEntity": {
    "@type": "Organization",
    "name": "Box To Go",
    "telephone": "+1-212-555-0100",
    "email": "sales@kora.example"
  }
}</script>
<link href="assets/styles.css" rel="stylesheet"/>
<link href="style.css" rel="stylesheet"/>
</head>
<body class="font-body bg-black text-cream antialiased">
<div id="site-header"></div>
<script src="js/components.js"></script>
<main>
<header class="ground pt-16 pb-16">
<div class="mx-auto max-w-wrap px-6 sm:px-8">
<div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-start">
<!-- left: pitch + contact -->
<div>
<span class="eyebrow">Get started</span>
<h1 class="font-display font-black uppercase text-[clamp(2.6rem,5vw,4.2rem)] leading-[.95] tracking-[-.02em] mt-5">
              Set up your<br/>restaurant in<br/><span class="text-gold-500">one call.</span></h1>
<p class="text-fg2 text-[18px] leading-relaxed mt-6 max-w-[460px]">Tell us about your kitchen and we'll send
              a quote, samples, and a delivery date — usually same day.</p>
<div class="flex flex-col gap-3.5 mt-9">
<a class="flex items-center gap-3 text-fg2 hover:text-gold-300 transition-colors" href="tel:+12125550100"><span class="w-9 h-9 rounded-[10px] border border-line flex items-center justify-center text-gold-400"><span aria-hidden="true" data-icon="phone" data-size="17"></span></span>(212) 555-0100</a>
<a class="flex items-center gap-3 text-fg2 hover:text-gold-300 transition-colors" href="mailto:sales@kora.example"><span class="w-9 h-9 rounded-[10px] border border-line flex items-center justify-center text-gold-400"><span aria-hidden="true" data-icon="mail" data-size="17"></span></span>sales@boxtogo.example</a>
<div class="flex items-center gap-3 text-fg2"><span class="w-9 h-9 rounded-[10px] border border-line flex items-center justify-center text-gold-400"><span aria-hidden="true" data-icon="clock" data-size="17"></span></span>Mon–Sat · 7am–7pm ET</div>
</div>
</div>
<!-- right: quote form -->
<div class="bg-ink-1 border border-line rounded-[20px] p-7 sm:p-9 shadow-soft">
<h2 class="font-display font-bold text-2xl">Request a quote</h2>
<p class="text-fg3 text-[14px] mt-1.5">No commitment — we'll reply within a business day.</p>
<form class="mt-6 flex flex-col gap-4" id="quoteForm" novalidate="">
<div class="grid sm:grid-cols-2 gap-4">
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">Your
                    name</label><input class="field" placeholder="Alex Rivera" required="" type="text"/></div>
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">Restaurant</label><input class="field" placeholder="Rivera's Taqueria" required="" type="text"/></div>
</div>
<div class="grid sm:grid-cols-2 gap-4">
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">Work
                    email</label><input class="field" placeholder="you@restaurant.com" required="" type="email"/></div>
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">Phone</label><input class="field" placeholder="(212) 555-0100" type="tel"/></div>
</div>
<div class="grid sm:grid-cols-2 gap-4">
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">Restaurant
                    type</label>
<select class="field">
<option>Full-service restaurant</option>
<option>Café / coffee shop</option>
<option>Food truck / pop-up</option>
<option>Ghost / cloud kitchen</option>
<option>Multi-location group</option>
</select>
</div>
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">Monthly
                    volume</label>
<select class="field">
<option>Under 20 cases</option>
<option>20–50 cases</option>
<option>50–150 cases</option>
<option>150+ cases</option>
</select>
</div>
</div>
<div><label class="font-mono text-[10.5px] tracking-[.1em] uppercase text-fg3 block mb-1.5">What do you
                  need? <span class="text-fg3 normal-case tracking-normal">(optional)</span></label>
<textarea class="field resize-none" placeholder="e.g. 16oz kraft bowls, hot cups, custom-printed bags…" rows="3"></textarea>
</div>
<button class="btn btn-primary btn-block btn-lg mt-1" type="submit"><span aria-hidden="true" data-icon="send" data-size="18"></span>Send
                request</button>
<p class="hidden text-success text-sm items-center gap-2" id="formMsg"></p>
</form>
</div>
</div>
</div>
</header>
</main>
<div id="site-footer"></div>
<script>window.BTG.bootPage();</script>
<script>
    (function () {
      var form = document.getElementById('quoteForm');
      var msg = document.getElementById('formMsg');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        if (!form.checkValidity()) { form.reportValidity(); return; }
        form.querySelectorAll('input, select, textarea, button').forEach(function (el) { el.setAttribute('disabled', ''); });
        msg.className = 'flex text-success text-sm items-center gap-2 mt-1';
        msg.innerHTML = (window.BTG ? window.BTG.icon('check-circle-2', 17) : '') + 'Thanks — your rep will be in touch within a business day.';
      });
    })();
  </script>
</body>
</html>
